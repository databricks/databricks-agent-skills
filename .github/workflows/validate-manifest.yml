name: Validate Manifest

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'experimental/**'
      - 'assets/**'
      - 'scripts/**'
      - 'manifest.json'
      - 'metaplugin/**'
      - '.claude-plugin/**'
      - '.github/plugin/**'
      - '.cursor-plugin/**'
      - '.agents/**'
      - 'plugins/**'
      - 'hooks/**'
      - 'commands/**'
      - 'rules/**'
      - 'tests/**'
  push:
    branches:
      - main

jobs:
  validate:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      # The Databricks CLI's files-channel installer reads the committed
      # manifest.json from main before fetching each listed file. This surfaces a
      # stale manifest entry (a 404 for `databricks aitools install`) before the
      # dry-run regeneration below can mask it.
      #
      # If a PR edits manifest.json directly, keep this as a hard gate: the PR is
      # changing the live-install index itself, not merely inheriting main's
      # current generated output.
      - name: Validate changed committed CLI manifest references
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" HEAD -- manifest.json | grep -q .; then
            python3 scripts/skills.py validate-committed-manifest
          else
            echo "manifest.json was not changed by this PR; running advisory visibility check next."
          fi

      # The same check is advisory for PR source changes: manifest.json is
      # regenerated only at release and then self-healed on main, so source-only
      # PRs can legitimately inherit a stale committed manifest from main.
      #
      # Advisory (continue-on-error), NOT a hard gate: manifest.json is
      # regenerated only at release, so between releases main's committed manifest
      # is legitimately stale for any added/deleted/reshaped skill. That staleness
      # is inherited by every branch cut from main, so hard-failing here blocks
      # innocent PRs for a problem they did not introduce. self-heal-manifest.yml
      # is the enforcement: it regenerates and commits manifest.json back to main
      # on every source push, so the window self-corrects. This step keeps the
      # signal visible on the PR without gating it.
      - name: Validate committed CLI manifest references (advisory)
        continue-on-error: true
        run: python3 scripts/skills.py validate-committed-manifest

      # This repo is published as a source-only mirror from an internal source of
      # truth. Generated artifacts (the plugins/ bundle, manifest.json, the
      # marketplace catalogs, the rendered hook/routing files) are regenerated and
      # committed only on release (see release.yml). Between releases a PR carries
      # source changes with intentionally stale generated files, so regenerate
      # from source here before validating. This is a DRY RUN: the regenerated
      # files are never committed (CI checkouts are ephemeral). It lets `validate`
      # and the generator tests run against a consistent tree, so a source change
      # that breaks generation, frontmatter, routing, or a test fails at PR time
      # instead of silently waiting until the next release.
      - name: Regenerate from source (dry run; not committed)
        run: python3 scripts/skills.py generate

      - name: Validate manifest is up to date
        run: python3 scripts/skills.py validate

      - name: Test plugin hooks
        run: python3 -m unittest discover -s tests -p '*_test.py' -v
