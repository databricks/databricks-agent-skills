name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag version (e.g. v0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate tag format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z format"
            exit 1
          fi

      - name: Create annotated tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION"
          # Tag is annotated (objecttype=tag) so `git tag -v <tag>` can verify
          # signatures once GPG/Sigstore signing lands. Today the tag is
          # annotated but unsigned — see RELEASING.md.
          git push origin "$VERSION"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --verify-tag
